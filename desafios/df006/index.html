<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tags html</title>
</head>
<body>
    <h1>Tags em html</h1>
    <p>Em HTML5, podemos inseir os elementos da lista a seguir.Passe o mouse sobre os termos prara descobrir qual tag utilizar em cada caso.</p>
    <ul type="square">
        <li><abbr title="inseir a tag &lt;p&gt;">Parágrafo</abbr></li>
        <li><abbr title="inseir a tag &lt;h&gt;, mais o respectível número">Títulos</abbr></li>
        <li><abbr title="inserir a tag &lt;img&gt;">Imagens</abbr></li>
        <li><abbr title="inserir a tag &lt;abbr&gt;">Abreviações</abbr></li>  
        <li><abbr title="inserir a tag &lt;code&gt;">Códigos-fonte</abbr></li>
        <li><abbr title="Inserir a tag &lt;ol&gt;">Listas numeradas</abbr></li>
        <li><abbr title="Inserir a tag &lt;ul&gt;">Lista com demarcadores</abbr></li>
    </ul>
</body>
</html>
