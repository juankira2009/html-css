<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em html5</title>
</head>
<body>
    <h1>Imagens dinâmicas</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador</p>

    <picture>
        <source media="(max-width:750px)" srcset="imagens/foto-P.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="Imagens/foto-M.png" type="image/png">
         <img src="imagens/foto-G.png" alt="A imagem fléxivel funciona">
    </picture>
    
    <h1>reproduzindo áudios</h1>
    
    <p>Vamos aprender a reproduzir áudios em html5</p>
    <audio preload="metadata" autoplay controls loop>
        
        <source src="midia/stay with me-miki matsubara.mp3" type="audio/mpeg">
        
        <source src="midia/stay with me-miki matsubara.mp3" type="audio/ogg">
        
        <source src="midia/stay with me-miki matsubara.wav" type="audio/wav">

        <p>infelizmente seu navegador não consegue reproduzir áudio. <a href="midia/stay with me-miki matsubara.mp3">Clique aqui para baixar o arquivo mp3</a></p>
    </audio>
</body>
</html>
