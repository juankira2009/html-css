<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo de hover</title>
    <style>
    div:hover{
            color: rgb(98, 0, 255);
        }
        div:hover > p{
            display: block;
            color: white;
            background-color: purple;
            width: 150px
        }
        div > p{
            display: none;
        }
    </style>
</head>
<body>
    <h1>exemplo de hover</h1>
    <p>passe o mouse sobre o texto abaixo para ver a mudança de cor</p>
    <div>passe o mouse sobre mim
        <p>TEXTO ESCONDIDO...</p>
    </div>
</body>
</html>
